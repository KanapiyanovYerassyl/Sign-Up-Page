<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <div class="image-container">
       
        <div class="card-body">
            <img src="./odin-lined.png" id="odin-project-logo" alt="Odin-Project-Logo">
            <h2 id="odin-card-text">ODIN</h2>
        </div>
    </div>
    <div class="main-form-container">
        <h3>This is not a real online service! You know you need something like this in your life you realize your deepest dreams. Sign up now to get started.</h3>
        <h3>You know you want to.</h3>

        <form action="example.com/path" method="post">
            <div class="form">
            <legend>Sign-Up!</legend>

            <div class="inputs">
            <div id="fname-div"><label for="first_name">FIRST NAME</label><input type="text" name="fname" id="fname"></div>
                
            <div id="lname-div"><label for="last_name">LAST NAME</label><input type="text" name="lname" id="lname"></div>
            
            <div id="email-div"><label for="email">EMAIL</label><input type="email" name="email" id="email"></div>
           
            <div id="tel-div"><label for="phone_number">PHONE NUMBER</label><input type="tel" name="tel" id="tel"></div>
            
            <div id="password-div"><label for="password">PASSWORD</label><input type="password" name="password" id="password"></div>
           
            <div id="conf-div"><label for="confirm_password">CONFIRM PASSWORD</label><input type="password" id="confirm_password" name="confirm_password"></div>
            </div>
            </div>
            <button id="submit-button" type="submit">Create Account</button>
            
            <p id="alr-have-account">Already have an account? <span>Log in</span></p>
        </form>
    </div>
</body>
</html>
